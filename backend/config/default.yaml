app:
  name: trading-intelligence-platform
  environment: local

market_data:
  exchange: binance
  symbols:
    - BTCUSDT
  source: trade_stream
  live_enabled: false
  reconnect_delay_seconds: 1.0
  max_reconnect_attempts:

candles:
  base_timeframe: 1m
  derived_timeframes:
    - 4h
    - 1d
    - 1w
  timezone: UTC

storage:
  candle_path: data/candles
  format: parquet

logging:
  level: INFO
